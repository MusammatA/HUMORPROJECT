<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Completing Sign-In...</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <p style="text-align: center; margin-top: 50px; font-family: sans-serif;">Completing sign-in...</p>

  <script>
    const STAY_SIGNED_IN_KEY = 'brain_rot_stay_signed_in_v1';

    function getStaySignedInPreference() {
      try {
        return localStorage.getItem(STAY_SIGNED_IN_KEY) !== 'false';
      } catch (_err) {
        return true;
      }
    }

    function getSupabaseClientOptions(options = {}) {
      const usePersistentStorage = typeof options.usePersistentStorage === 'boolean'
        ? options.usePersistentStorage
        : getStaySignedInPreference();
      const storage = usePersistentStorage ? localStorage : sessionStorage;
      return {
        auth: {
          persistSession: true,
          autoRefreshToken: true,
          detectSessionInUrl: options.detectSessionInUrl !== false,
          flowType: 'pkce',
          storage
        }
      };
    }

    function isPkceVerifierError(error) {
      const message = String(error?.message || error || '').toLowerCase();
      return message.includes('pkce') || message.includes('code verifier');
    }

    async function getPublicSupabaseConfig() {
      const response = await fetch('/api/public-config', {
        method: 'GET',
        headers: { Accept: 'application/json' },
        cache: 'no-store'
      });
      const payload = await response.json().catch(() => ({}));
      if (!response.ok) {
        throw new Error(payload.error || 'Failed to load public app config.');
      }

      const supabaseUrl = String(payload.supabaseUrl || '').trim();
      const supabaseAnonKey = String(payload.supabaseAnonKey || '').trim();
      if (!supabaseUrl || !supabaseAnonKey) {
        throw new Error('Public Supabase config is incomplete.');
      }

      return { supabaseUrl, supabaseAnonKey };
    }

    async function exchangeCodeForSession(config, code) {
      const preferredPersistentStorage = getStaySignedInPreference();
      const storageAttempts = [preferredPersistentStorage, !preferredPersistentStorage];
      let lastError = null;

      for (const usePersistentStorage of storageAttempts) {
        const client = window.supabase.createClient(
          config.supabaseUrl,
          config.supabaseAnonKey,
          getSupabaseClientOptions({
            usePersistentStorage,
            detectSessionInUrl: false
          })
        );

        const { error } = await client.auth.exchangeCodeForSession(code);
        if (!error) return;

        lastError = error;
        if (!isPkceVerifierError(error)) throw error;
      }

      throw lastError || new Error('Unable to complete sign-in.');
    }

    async function completeAuth() {
      try {
        const config = await getPublicSupabaseConfig();
        const params = new URLSearchParams(window.location.search);
        const code = params.get('code');

        if (code) {
          await exchangeCodeForSession(config, code);
        } else {
          const client = window.supabase.createClient(
            config.supabaseUrl,
            config.supabaseAnonKey,
            getSupabaseClientOptions({ detectSessionInUrl: true })
          );
          const { error } = await client.auth.getSession();
          if (error) throw error;
        }

        window.location.replace('/');
      } catch (error) {
        console.error('Auth callback error:', error);
        document.body.innerHTML = '<p style="text-align: center; color: red; font-family: sans-serif; margin-top: 50px;">Sign-in failed: ' + (error?.message || 'Unknown error') + '</p>';
      }
    }

    completeAuth();
  </script>
</body>
</html>
